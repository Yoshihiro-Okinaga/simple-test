name: Test Action

on:
  push:
  pull_request:
  # 手動でも実行できるように設定（テスト用に便利です）
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    
    steps:
      - name: リポジトリを取得
        uses: actions/checkout@v4

      - name: Pythonのセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.13' # 必要に応じてバージョンを変更してください

      - name: ライブラリのインストール
        run: |
          python -m pip install --upgrade pip
          pip install platformdirs

      - name: Pythonスクリプトの実行
        run: |
          python test_program.py
